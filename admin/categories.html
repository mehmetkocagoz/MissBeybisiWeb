<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kategoriler — MissBeybisi Admin</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <aside class="admin-sidebar">
    <a href="index.html" class="sidebar-logo">Miss<span>Beybisi</span><span class="sidebar-subtitle">Admin</span></a>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Genel</div>
      <a href="index.html"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="orders.html"><span class="nav-icon">🛒</span> Siparişler</a>
      <div class="nav-section-label">Katalog</div>
      <a href="products.html"><span class="nav-icon">👗</span> Ürünler</a>
      <a href="categories.html" class="active"><span class="nav-icon">🏷️</span> Kategoriler</a>
      <a href="stock.html"><span class="nav-icon">📦</span> Stok</a>
      <div class="nav-section-label">Muhasebe</div>
      <a href="sales.html"><span class="nav-icon">💰</span> Satışlar</a>
      <a href="payments.html"><span class="nav-icon">💳</span> Ödemeler</a>
      <a href="invoices.html"><span class="nav-icon">🧾</span> Faturalar</a>
      <div class="nav-section-label">Kişiler</div>
      <a href="customers.html"><span class="nav-icon">👥</span> Müşteriler</a>
      <a href="suppliers.html"><span class="nav-icon">🏭</span> Tedarikçiler</a>
    </nav>
    <div class="sidebar-footer">
      <a href="../index.html" target="_blank">Siteyi Gör ↗</a> &nbsp;·&nbsp;
      <a href="#" id="signout-btn">Çıkış</a>
    </div>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <h1>Kategoriler</h1>
      <div class="topbar-actions">
        <button class="btn btn--primary" id="add-btn">+ Yeni Kategori</button>
      </div>
    </div>
    <div class="admin-content">
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Sıra</th>
                <th>Ad</th>
                <th>Slug</th>
                <th>Durum</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="table-body">
              <tr><td colspan="5"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-backdrop hidden" id="item-modal">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title" id="modal-title">Kategori Ekle</h2>
        <button class="modal__close">×</button>
      </div>
      <form id="item-form">
        <input type="hidden" id="f-id">
        <div class="form-grid">
          <div class="form-group form-group--full">
            <label>Ad</label>
            <input type="text" id="f-name" required placeholder="Örn. Okul Önlüğü">
          </div>
          <div class="form-group form-group--full">
            <label>Slug</label>
            <input type="text" id="f-slug" required placeholder="okul-onlugu">
          </div>
          <div class="form-group">
            <label>Sıra</label>
            <input type="number" id="f-sort" min="0" value="0">
          </div>
          <div class="form-group">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin-top:28px">
              <input type="checkbox" id="f-active" checked> Aktif
            </label>
          </div>
        </div>
        <div class="modal__footer">
          <button type="submit" class="btn btn--primary">Kaydet</button>
          <button type="button" class="btn btn--ghost modal__close">İptal</button>
        </div>
      </form>
    </div>
  </div>

  <div id="admin-toast"></div>

  <script type="module">
    import { supabase, fmtDate, showToast, openModal, closeModal } from './js/admin-common.js';

    let all = [];

    async function load() {
      const { data, error } = await supabase.from('categories').select('*').order('sort_order');
      if (error) { showToast('Hata: ' + error.message); return; }
      all = data || [];
      render(all);
    }

    function render(rows) {
      const tbody = document.getElementById('table-body');
      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="empty-state__icon">🏷️</div><div class="empty-state__text">Kategori bulunamadı</div></div></td></tr>';
        return;
      }
      tbody.innerHTML = rows.map(c => `
        <tr>
          <td>${c.sort_order}</td>
          <td style="font-weight:600">${c.name}</td>
          <td style="font-size:13px;color:var(--text-muted)">${c.slug}</td>
          <td><span class="badge ${c.active ? 'badge--green' : 'badge--red'}">${c.active ? 'Aktif' : 'Pasif'}</span></td>
          <td style="display:flex;gap:6px">
            <button class="btn btn--ghost btn--sm" data-edit="${c.id}">Düzenle</button>
            <button class="btn btn--danger btn--sm" data-del="${c.id}">Sil</button>
          </td>
        </tr>
      `).join('');
      tbody.querySelectorAll('[data-edit]').forEach(b => b.addEventListener('click', () => openEdit(b.dataset.edit)));
      tbody.querySelectorAll('[data-del]').forEach(b => b.addEventListener('click', () => del(b.dataset.del)));
    }

    document.getElementById('f-name').addEventListener('input', e => {
      if (!document.getElementById('f-id').value) {
        document.getElementById('f-slug').value = e.target.value
          .toLowerCase().trim()
          .replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s')
          .replace(/ı/g,'i').replace(/ö/g,'o').replace(/ç/g,'c')
          .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
      }
    });

    document.getElementById('add-btn').addEventListener('click', () => {
      document.getElementById('modal-title').textContent = 'Yeni Kategori';
      document.getElementById('item-form').reset();
      document.getElementById('f-id').value = '';
      document.getElementById('f-active').checked = true;
      document.getElementById('f-sort').value = all.length;
      openModal('item-modal');
    });

    function openEdit(id) {
      const c = all.find(x => x.id === id);
      if (!c) return;
      document.getElementById('modal-title').textContent = 'Kategoriyi Düzenle';
      document.getElementById('f-id').value     = c.id;
      document.getElementById('f-name').value   = c.name;
      document.getElementById('f-slug').value   = c.slug;
      document.getElementById('f-sort').value   = c.sort_order;
      document.getElementById('f-active').checked = c.active;
      openModal('item-modal');
    }

    document.getElementById('item-form').addEventListener('submit', async e => {
      e.preventDefault();
      const id = document.getElementById('f-id').value;
      const payload = {
        name:       document.getElementById('f-name').value.trim(),
        slug:       document.getElementById('f-slug').value.trim(),
        sort_order: parseInt(document.getElementById('f-sort').value, 10) || 0,
        active:     document.getElementById('f-active').checked,
      };
      if (id) payload.id = id;
      const { error } = await supabase.from('categories').upsert(payload);
      if (error) { showToast('Hata: ' + error.message); return; }
      showToast(id ? 'Kategori güncellendi' : 'Kategori eklendi');
      closeModal('item-modal');
      load();
    });

    async function del(id) {
      if (!confirm('Bu kategoriyi silmek istediğinize emin misiniz? Bu kategoriyi kullanan ürünler varsa silme işlemi başarısız olur.')) return;
      const { error } = await supabase.from('categories').delete().eq('id', id);
      if (error) { showToast('Hata: ' + error.message); return; }
      showToast('Kategori silindi');
      load();
    }

    load();
  </script>
</body>
</html>
