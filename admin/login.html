<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş — MissBeybisi Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; background: var(--bg); }
    .login-card { background: #fff; border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; }
    .login-logo { font-size: 22px; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
    .login-logo span { color: var(--text); }
    .login-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 28px; }
    .login-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    #login-error { color: var(--danger); font-size: 13px; margin-bottom: 12px; display: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">Miss<span>Beybisi</span></div>
    <div class="login-sub">Admin Paneli</div>
    <h2>Giriş Yap</h2>
    <p id="login-error"></p>
    <form id="login-form">
      <div class="form-group" style="margin-bottom:16px">
        <label for="email">E-posta</label>
        <input type="email" id="email" required autocomplete="email">
      </div>
      <div class="form-group" style="margin-bottom:24px">
        <label for="password">Şifre</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn--primary" style="width:100%;justify-content:center">Giriş Yap</button>
    </form>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from '../js/config.js';
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const { data: { session } } = await sb.auth.getSession();
    if (session) location.href = 'index.html';

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const errEl = document.getElementById('login-error');
      errEl.style.display = 'none';
      const { error } = await sb.auth.signInWithPassword({
        email:    document.getElementById('email').value,
        password: document.getElementById('password').value,
      });
      if (error) {
        errEl.textContent = 'Giriş başarısız: ' + error.message;
        errEl.style.display = 'block';
      } else {
        location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
